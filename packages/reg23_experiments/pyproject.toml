[project]
name = "reg23-experiments"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "kornia==0.8.0",
    "nibabel==5.3.2",
    "numpy==2.2.1",
    "pandas==2.2.3",
    "platformdirs==4.3.6",
    "pydicom==3.0.1",
    "pynrrd==1.1.1",
    "pyswarms>=1.3.0",
    "pyyaml==6.0.2",
    "scipy==1.15.1",
    "send2trash==1.8.3",
    "setuptools==75.8.0",
    "simpleitk==2.4.1",
    "tqdm==4.67.1",
    "traitlets==5.14.3",
    "nvidia-ml-py>=13.590.48",
    "tifffile>=2025.10.16",
    "pyarrow>=24.0.0",
    "matplotlib==3.10.0",
    "pyvista>=0.48.0",
    "requests>=2.32.3",
    "graphviz>=0.21",
    "jaxtyping>=0.3.9",
]

# sets of optional dependencies (distinct from the normal dependencies above) are defined
[project.optional-dependencies]
cpu = [
    "reg23-core[cpu]", # the option in the square brackets is a group of optional dependencies
]
cuda = [
    "reg23-core[cuda]",
]
dev = [
    "reg23-core[dev]",
    "pytest>=8.3.4",
    "torchviz>=0.0.3",
    "scipy-stubs>=1.17.1.4",
]

[dependency-groups]
docs = [
    "pdoc>=16.0.0",
]

[tool.uv]
# the project is re-built when any of the following globbed files are modified
cache-keys = [
    { file = "pyproject.toml" },
]
# conflicts between optional dependencies are stated so that uv doesn't try to install them by default and complain
conflicts = [
    [
        { extra = "cpu" },
        { extra = "cuda" },
    ],
]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
